# Rate limiting must be defined in http context
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

upstream suture_platform {
    server 127.0.0.1:3000;
}

upstream suture_hub {
    server 127.0.0.1:8080;
}

server {
    listen 443 ssl http2;
    server_name suture.example.com;

    ssl_certificate /etc/ssl/certs/suture.pem;
    ssl_certificate_key /etc/ssl/private/suture.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://suture_platform;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://suture_platform;
    }
}

server {
    listen 443 ssl http2;
    server_name hub.suture.example.com;

    ssl_certificate /etc/ssl/certs/suture.pem;
    ssl_certificate_key /etc/ssl/private/suture.key;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        proxy_pass http://suture_hub;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        client_max_body_size 100M;
    }
}
