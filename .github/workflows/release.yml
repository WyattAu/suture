name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: suture

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: suture
            asset_suffix: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: aarch64-macos
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: x86_64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: suture.exe
            asset_suffix: x86_64-windows

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p suture-cli

      - name: Verify binary
        run: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }} version
        shell: bash

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../suture-${{ matrix.asset_suffix }}.tar.gz ${{ matrix.artifact_name }}
          cd ../../../
          sha256sum suture-${{ matrix.asset_suffix }}.tar.gz > suture-${{ matrix.asset_suffix }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path suture.exe -DestinationPath ../../../suture-${{ matrix.asset_suffix }}.zip
          cd ../../../
          (Get-FileHash -Path "suture-${{ matrix.asset_suffix }}.zip" -Algorithm SHA256).Hash.ToLower() + "  suture-${{ matrix.asset_suffix }}.zip" | Out-File -Encoding ascii "suture-${{ matrix.asset_suffix }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suture-${{ matrix.asset_suffix }}
          path: |
            suture-${{ matrix.asset_suffix }}.tar.gz
            suture-${{ matrix.asset_suffix }}.tar.gz.sha256
            suture-${{ matrix.asset_suffix }}.zip
            suture-${{ matrix.asset_suffix }}.zip.sha256

  publish-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify crates can be published
        run: cargo publish --dry-run --workspace

  source-tarball:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          tar czf suture-src.tar.gz \
            --exclude='.git' \
            --exclude='target' \
            --exclude='.direnv' \
            --exclude='.ruff_cache' \
            --exclude='node_modules' \
            .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: suture-source
          path: suture-src.tar.gz

  release:
    needs: [build, publish-dry-run, source-tarball]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums manifest
        run: |
          echo "## Checksums" > CHECKSUMS.md
          echo "" >> CHECKSUMS.md
          echo "Verify artifacts with:" >> CHECKSUMS.md
          echo '```' >> CHECKSUMS.md
          for f in artifacts/*.sha256; do
            cat "$f" >> CHECKSUMS.md
          done
          echo '```' >> CHECKSUMS.md

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: true
          body_path: CHECKSUMS.md
