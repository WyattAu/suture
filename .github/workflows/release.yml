name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Fallback: manually trigger after tag push

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
  BINARY_NAME: suture

jobs:
  # ── Build release binaries for all platforms ──────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: suture
            asset_suffix: x86_64-linux
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: aarch64-macos
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: x86_64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: suture.exe
            asset_suffix: x86_64-windows

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p suture-cli

      - name: Verify binary
        run: ./target/${{ matrix.target }}/release/${{ matrix.artifact_name }} version
        shell: bash

      - name: Strip binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/${{ matrix.artifact_name }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../suture-${{ matrix.asset_suffix }}.tar.gz ${{ matrix.artifact_name }}
          cd ../../../
          sha256sum suture-${{ matrix.asset_suffix }}.tar.gz > suture-${{ matrix.asset_suffix }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path suture.exe -DestinationPath ../../../suture-${{ matrix.asset_suffix }}.zip
          cd ../../../
          (Get-FileHash -Path "suture-${{ matrix.asset_suffix }}.zip" -Algorithm SHA256).Hash.ToLower() + "  suture-${{ matrix.asset_suffix }}.zip" | Out-File -Encoding ascii "suture-${{ matrix.asset_suffix }}.zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suture-${{ matrix.asset_suffix }}
          path: |
            suture-${{ matrix.asset_suffix }}.tar.gz
            suture-${{ matrix.asset_suffix }}.tar.gz.sha256
            suture-${{ matrix.asset_suffix }}.zip
            suture-${{ matrix.asset_suffix }}.zip.sha256

  # ── Publish to crates.io ─────────────────────────────────────────
  publish-crates:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: []  # Run in parallel with builds (no dependency on them)

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: publish

      # Verify everything builds and tests pass before publishing
      - name: Test workspace
        run: cargo test --workspace --exclude suture-py --exclude suture-e2e --exclude suture-bench --exclude suture-fuzz --exclude suture-vfs --exclude suture-lsp --exclude suture-driver-pdf --exclude suture-driver-image --exclude suture-driver-svg --exclude suture-driver-pptx -- --test-threads=1

      # Publish crates in dependency order using the existing script
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "$CARGO_REGISTRY_TOKEN" ]; then
            echo "::notice::CARGO_REGISTRY_TOKEN not set — skipping crates.io publish"
            exit 0
          fi
          bash scripts/publish.sh --real

  # ── Publish npm package ──────────────────────────────────────────
  publish-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: suture-x86_64-linux
          path: /tmp/binaries

      - name: Update npm version from git tag
        working-directory: packages/suture-merge-driver
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          npm version "$TAG" --no-git-tag-version

      - name: Publish to npm
        working-directory: packages/suture-merge-driver
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::notice::NPM_TOKEN not set — skipping npm publish"
            exit 0
          fi
          npm publish --access public

  # ── Publish pip package ──────────────────────────────────────────
  publish-pip:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install build twine

      - name: Build package
        working-directory: packages/suture-merge-py
        run: python -m build

      - name: Publish to PyPI
        working-directory: packages/suture-merge-py
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -z "$TWINE_PASSWORD" ]; then
            echo "::notice::PYPI_API_TOKEN not set — skipping PyPI publish"
            exit 0
          fi
          twine upload dist/*

  # ── Source tarball ────────────────────────────────────────────────
  source-tarball:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Create source tarball
        run: |
          tar czf suture-src.tar.gz \
            --exclude='.git' \
            --exclude='target' \
            --exclude='.direnv' \
            --exclude='node_modules' \
            .

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: suture-source
          path: suture-src.tar.gz

  # ── Create GitHub Release ────────────────────────────────────────
  release:
    needs: [build, publish-crates, source-tarball]
    if: always()  # Always create release even if publish is skipped (no token)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums manifest
        run: |
          echo "## Checksums" > CHECKSUMS.md
          echo "" >> CHECKSUMS.md
          echo "Verify artifacts with:" >> CHECKSUMS.md
          echo '```' >> CHECKSUMS.md
          for f in artifacts/*.sha256; do
            [ -f "$f" ] && cat "$f" >> CHECKSUMS.md
          done
          echo '```' >> CHECKSUMS.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          body_path: CHECKSUMS.md
