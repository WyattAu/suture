name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: suture
            asset_suffix: x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: suture
            asset_suffix: aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: suture
            asset_suffix: x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../suture-${{ matrix.asset_suffix }}.tar.gz suture

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path suture.exe -DestinationPath ../../../suture-${{ matrix.asset_suffix }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suture-${{ matrix.asset_suffix }}
          path: suture-${{ matrix.asset_suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
