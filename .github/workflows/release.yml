name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: suture
            asset_suffix: x86_64-linux
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: suture
            asset_suffix: aarch64-linux
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: suture
            asset_suffix: aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: suture
            asset_suffix: x86_64-windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Install cross-compiler (ARM Linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Run tests (default target only)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: cargo test --workspace --exclude suture-e2e --exclude suture-bench --exclude suture-fuzz

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} -p suture-cli

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../suture-${{ matrix.asset_suffix }}.tar.gz suture

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path suture.exe -DestinationPath ../../../suture-${{ matrix.asset_suffix }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: suture-${{ matrix.asset_suffix }}
          path: suture-${{ matrix.asset_suffix }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          generate_release_notes: true
