name: Deploy

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace --exclude suture-py --exclude suture-e2e --exclude suture-wasm-plugin -- --test-threads=1
      - run: cargo clippy --workspace --exclude suture-py --exclude suture-e2e --exclude suture-wasm-plugin -- -D warnings

  build-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo build --release -p suture-platform -p suture-hub
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/suture-platform
            target/release/suture-hub

  deploy-platform:
    needs: build-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-hub:
    needs: build-release
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config fly.hub.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  release:
    needs: [test, build-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: sudo apt-get install -y protobuf-compiler
      - run: cargo publish --workspace --token ${{ secrets.CARGO_TOKEN }} || true
        continue-on-error: true
