name: Semantic Merge Check
on:
  pull_request:
    paths:
      - '**.json'
      - '**.yaml'
      - '**.yml'
      - '**.toml'
      - '**.xml'
      - '**.csv'
      - '**.md'
      - '**.docx'
      - '**.xlsx'
      - '**.pptx'

jobs:
  semantic-merge:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./.github/actions/semantic-merge
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          fail-on-conflict: 'false'
          file-patterns: '*.json,*.yaml,*.yml,*.toml,*.xml,*.csv,*.md,*.docx,*.xlsx,*.pptx'
