name: Docker Build & Push

on:
  push:
    tags: ['v*']
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  test-image:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pull and test
        run: |
          IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):main"
          docker pull "$IMAGE" || true
          docker run -d --name suture-test -p 8080:8080 "$IMAGE"
          sleep 5
          # Health check
          curl -sf http://localhost:8080/healthz | grep -q "ok"
          # Register and login
          curl -sf -X POST http://localhost:8080/auth/register \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@suture.dev","password":"testpass1234"}' | grep -q "token"
          # Merge API
          TOKEN=$(curl -sf -X POST http://localhost:8080/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@suture.dev","password":"testpass1234"}' | python3 -c "import sys,json;print(json.load(sys.stdin)['token'])")
          curl -sf -X POST http://localhost:8080/api/merge \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $TOKEN" \
            -d '{"driver":"json","base":"{}","ours":"{\"a\":1}","theirs":"{\"b\":2}"}' | grep -q "merged"
          echo "All smoke tests passed"
          docker stop suture-test
