[package]
name = "suture-s3"
version = "0.1.0"
edition = "2024"

[dependencies]
suture-common = { path = "../suture-common", version = "1.1.0" }
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
chrono = "0.4"
thiserror = "2"
tracing = "0.1"
tokio = { version = "1", features = ["rt"] }
base64 = "0.22"
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"
url = "2"
