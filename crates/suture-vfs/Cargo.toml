[package]
name = "suture-vfs"
version = "0.1.0"
edition = "2024"
license.workspace = true
repository.workspace = true
description = "Read-only FUSE3 mount exposing a Suture repository as a regular directory tree"
homepage.workspace = true
keywords.workspace = true
readme.workspace = true
categories.workspace = true

[dependencies]
suture-core = { path = "../suture-core", version = "1.1.0" }
suture-protocol = { path = "../suture-protocol", version = "1.1.0" }
fuse3 = { version = "0.9", features = ["tokio-runtime"] }
libc = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = "0.3"
anyhow = "1"
futures-core = "0.3"
async-stream = "0.3"
bytes = "1"
axum = "0.8"
tower = "0.5"

[dev-dependencies]
tempfile = "3"
