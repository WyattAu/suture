[package]
name = "suture-wasm-plugin"
version = "0.1.0"
edition = "2024"
description = "Wasm plugin system for custom merge strategies"
license = "MIT OR Apache-2.0"
repository = "https://github.com/WyattAu/suture"

[dependencies]
wasmtime = { version = "44", features = ["runtime", "component-model"] }
anyhow = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
thiserror = "2"

[dev-dependencies]
tempfile = "3"
