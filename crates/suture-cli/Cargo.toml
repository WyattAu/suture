[package]
name = "suture-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
suture-core = { path = "../suture-core" }
suture-common = { path = "../suture-common" }
clap = { version = "4.5", features = ["derive"] }
clap_complete = "4.6"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
base64 = "0.22"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
ed25519-dalek = "2"
rand = "0.8"
hex = "0.4"
