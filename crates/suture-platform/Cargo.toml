[package]
name = "suture-platform"
version = "0.1.0"
edition = "2024"
description = "Hosted Suture platform — semantic merge as a service"
license = "AGPL-3.0-only"

[dependencies]
suture-hub = { path = "../suture-hub" }
suture-driver = { path = "../suture-driver" }
suture-common = { path = "../suture-common" }
suture-protocol = { path = "../suture-protocol" }
suture-driver-json = { path = "../suture-driver-json" }
suture-driver-yaml = { path = "../suture-driver-yaml" }
suture-driver-toml = { path = "../suture-driver-toml" }
suture-driver-xml = { path = "../suture-driver-xml" }
suture-driver-csv = { path = "../suture-driver-csv" }
axum = { version = "0.8", features = ["json", "form", "multipart"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "request-id", "trace", "compression-gzip"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.39", features = ["bundled"] }
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.9"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
