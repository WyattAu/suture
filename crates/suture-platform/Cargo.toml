[package]
name = "suture-platform"
version = "0.1.0"
edition = "2024"
description = "Hosted Suture platform — semantic merge as a service"
license = "AGPL-3.0-only"

[dependencies]
suture-hub = { path = "../suture-hub" }
suture-driver = { path = "../suture-driver" }
suture-common = { path = "../suture-common" }
suture-protocol = { path = "../suture-protocol" }
suture-driver-json = { path = "../suture-driver-json" }
suture-driver-yaml = { path = "../suture-driver-yaml" }
suture-driver-toml = { path = "../suture-driver-toml" }
suture-driver-xml = { path = "../suture-driver-xml" }
suture-driver-csv = { path = "../suture-driver-csv" }
suture-driver-sql = { path = "../suture-driver-sql" }
suture-driver-html = { path = "../suture-driver-html" }
suture-driver-markdown = { path = "../suture-driver-markdown" }
suture-driver-svg = { path = "../suture-driver-svg" }
suture-driver-docx = { path = "../suture-driver-docx" }
suture-driver-feed = { path = "../suture-driver-feed" }
suture-driver-ical = { path = "../suture-driver-ical" }
suture-driver-image = { path = "../suture-driver-image" }
suture-driver-otio = { path = "../suture-driver-otio" }
suture-driver-pdf = { path = "../suture-driver-pdf" }
suture-driver-pptx = { path = "../suture-driver-pptx" }
suture-driver-xlsx = { path = "../suture-driver-xlsx" }
suture-driver-example = { path = "../suture-driver-example" }
axum = { version = "0.8", features = ["json", "form", "multipart"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "request-id", "trace", "compression-gzip"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.39", features = ["bundled"] }
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.9"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
