[package]
name = "suture-platform"
version = "0.1.0"
edition = "2024"
description = "Hosted Suture platform — semantic merge as a service"
license = "AGPL-3.0-or-later"
license-file = "LICENSE"
repository = "https://github.com/WyattAu/suture"

[dependencies]
suture-hub = { path = "../suture-hub", version = "5.1.0" }
suture-driver = { path = "../suture-driver", version = "5.1.0" }
suture-common = { path = "../suture-common", version = "5.1.0" }
suture-protocol = { path = "../suture-protocol", version = "5.1.0" }
suture-driver-json = { path = "../suture-driver-json", version = "5.1.0" }
suture-driver-yaml = { path = "../suture-driver-yaml", version = "5.1.0" }
suture-driver-toml = { path = "../suture-driver-toml", version = "5.1.0" }
suture-driver-xml = { path = "../suture-driver-xml", version = "5.1.0" }
suture-driver-csv = { path = "../suture-driver-csv", version = "5.1.0" }
suture-driver-sql = { path = "../suture-driver-sql", version = "5.1.0" }
suture-driver-html = { path = "../suture-driver-html", version = "5.1.0" }
suture-driver-markdown = { path = "../suture-driver-markdown", version = "5.1.0" }
suture-driver-svg = { path = "../suture-driver-svg", version = "5.1.0" }
suture-driver-docx = { path = "../suture-driver-docx", version = "5.1.0" }
suture-driver-feed = { path = "../suture-driver-feed", version = "5.1.0" }
suture-driver-ical = { path = "../suture-driver-ical", version = "5.1.0" }
suture-driver-image = { path = "../suture-driver-image", version = "5.1.0" }
suture-driver-otio = { path = "../suture-driver-otio", version = "5.1.0" }
suture-driver-pdf = { path = "../suture-driver-pdf", version = "5.1.0" }
suture-driver-pptx = { path = "../suture-driver-pptx", version = "5.1.0" }
suture-driver-xlsx = { path = "../suture-driver-xlsx", version = "5.1.0" }
suture-driver-example = { path = "../suture-driver-example", version = "5.1.0" }
suture-wasm-plugin = { path = "../suture-wasm-plugin", version = "0.1.0" }
axum = { version = "0.8", features = ["json", "form", "multipart"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "request-id", "trace", "compression-gzip"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
rusqlite = { version = "0.39", features = ["bundled"] }
jsonwebtoken = "9"
argon2 = "0.5"
rand = "0.9"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "2"
clap = { version = "4", features = ["derive"] }
anyhow = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
hmac = "0.12"
sha2 = "0.10"
hex = "0.4"

[dev-dependencies]
tempfile = "3"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
tokio = { version = "1", features = ["full"] }
