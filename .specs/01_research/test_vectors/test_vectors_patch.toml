[metadata]
algorithm_id = "ALG-MERGE-001"
algorithm_version = "1.0.0"
generation_date = "2026-03-27"
verification_status = "verified"

[precision_requirements]
floating_point_type = "f64"
absolute_tolerance = 0.0
# Patch operations are exact — no floating-point tolerance

[[test_vector]]
id = "TV-PATCH-001"
name = "Two disjoint patches commute"
category = "nominal"
priority = "critical"
description = "P1 edits cell A1, P2 edits cell B1. They must commute."

[test_vector.input]
patch_a = { type = "edit_cell", address = "A1", old_value = "hello", new_value = "world" }
patch_b = { type = "edit_cell", address = "B1", old_value = "42", new_value = "99" }

[test_vector.expected_output]
commutes = true
merge_result = { "A1" = "world", "B1" = "99" }
conflict_count = 0

[test_vector.verification]
source = "Mathematical derivation (THM-COMM-001)"
method = "Analytical"
confidence = 0.99

[[test_vector]]
id = "TV-PATCH-002"
name = "Two overlapping patches conflict"
category = "nominal"
priority = "critical"
description = "P1 edits cell A1 to X, P2 edits cell A1 to Y. They must conflict."

[test_vector.input]
patch_a = { type = "edit_cell", address = "A1", old_value = "hello", new_value = "X" }
patch_b = { type = "edit_cell", address = "A1", old_value = "hello", new_value = "Y" }

[test_vector.expected_output]
commutes = false
conflict_count = 1
conflict_addresses = ["A1"]

[test_vector.verification]
source = "Mathematical derivation (THM-COMM-001)"
method = "Analytical"
confidence = 0.99

[[test_vector]]
id = "TV-PATCH-003"
name = "Identity patch commutes with everything"
category = "boundary"
priority = "high"
description = "Identity patch has empty touch set, must commute with any patch."

[test_vector.input]
patch_a = { type = "identity" }
patch_b = { type = "edit_cell", address = "A1", old_value = "hello", new_value = "world" }

[test_vector.expected_output]
commutes = true
conflict_count = 0

[test_vector.verification]
source = "LEM-002 (Identity Patch)"
method = "Analytical"
confidence = 0.99

[[test_vector]]
id = "TV-PATCH-004"
name = "Three-way merge with conflicts"
category = "nominal"
priority = "critical"
description = "Branch A edits A1 and B1. Branch B edits B1 and C1. Only B1 conflicts."

[test_vector.input]
base_state = { "A1" = "0", "B1" = "0", "C1" = "0" }
branch_a_patches = [
  { type = "edit_cell", address = "A1", new_value = "a" },
  { type = "edit_cell", address = "B1", new_value = "a" },
]
branch_b_patches = [
  { type = "edit_cell", address = "B1", new_value = "b" },
  { type = "edit_cell", address = "C1", new_value = "b" },
]

[test_vector.expected_output]
merged_addresses = { "A1" = "a", "C1" = "b" }
conflict_count = 1
conflict_addresses = ["B1"]

[test_vector.verification]
source = "THM-MERGE-001 (Deterministic Merge)"
method = "Analytical"
confidence = 0.95

