# =============================================================================
# DIRECTION B: ENTERPRISE INFRASTRUCTURE
# =============================================================================
# Goal: Make Suture invisible to NLEs via VFS mount.
# This is the unique differentiator — no other VCS does this.
# =============================================================================

[[phase]]
id = "v2.0_vfs_proto"
title = "VFS Prototype — FUSE Read-Only Mount (Linux)"
agent = "Breaker"
status = "planned"
depends_on = ["v1.4"]

[phase.objectives]
description = "Implement a read-only FUSE mount that exposes a Suture repo as a regular directory tree. Files are read from CAS on demand. This proves the VFS concept on the simplest platform first."

[phase.outputs]
artifacts = [
    "crates/suture-vfs/Cargo.toml (new crate)",
    "crates/suture-vfs/src/fuse/mod.rs",
    "crates/suture-vfs/src/fuse/read_only.rs",
    "crates/suture-vfs/src/path_translation.rs",
]
report = ".reports/phase_v20_vfs_proto_report.md"

[phase.quality_gates]
gates = [
    "Read-only mount: ls, cat, stat work on mounted Suture repo",
    "Branch switching: unmount/remount shows different branch contents",
    "Performance: file read latency <10ms for files in CAS",
    "No data corruption: CAS integrity verified after 1000 random read sequences",
    "Clean unmount: no resource leaks on unmount",
    "Tests: unit tests for path translation, integration tests for mount/unmount",
]

[[phase]]
id = "v2.0_vfs_rw"
title = "VFS Read-Write Mount"
agent = "Breaker"
status = "planned"
depends_on = ["v2.0_vfs_proto"]

[phase.objectives]
description = "Extend the FUSE mount to support writes. File saves create patches automatically. Conflict detection on concurrent writes."

[phase.outputs]
artifacts = [
    "crates/suture-vfs/src/fuse/read_write.rs",
    "crates/suture-vfs/src/conflict_detector.rs",
]
report = ".reports/phase_v20_vfs_rw_report.md"

[phase.quality_gates]
gates = [
    "Write: echo 'hello' > mounted_file creates a patch",
    "Auto-commit: file save triggers patch creation",
    "Conflict: concurrent writes to same file detected and flagged",
    "NLE compatibility: DaVinci Resolve can open/save files on mount",
    "Performance: write latency <50ms (patch creation + CAS store)",
]

[[phase]]
