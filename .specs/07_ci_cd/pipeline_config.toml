# Suture CI/CD Pipeline Configuration
# Phase 6: Automated build, test, lint, and security pipeline

[pipeline]
name = "suture-ci"
version = "1.0.0"
description = "Continuous integration pipeline for the Suture USVCS project"

[triggers]
push_branches = ["main"]
pull_request_branches = ["main"]

[jobs.build_and_test]
name = "build-and-test"
runs_on = "ubuntu-latest"
steps = [
    { action = "checkout", uses = "actions/checkout@v4" },
    { action = "install_nix", uses = "DeterminateSystems/nix-installer-action@main" },
    { action = "nix_cache", uses = "DeterminateSystems/magic-nix-cache-action@main" },
    { action = "build", run = "nix develop --command cargo build --workspace" },
    { action = "test", run = "nix develop --command cargo test --workspace" },
    { action = "clippy", run = "nix develop --command cargo clippy --workspace -- -D warnings" },
    { action = "fmt_check", run = "nix develop --command cargo fmt --workspace -- --check" },
]

[jobs.security]
name = "security"
runs_on = "ubuntu-latest"
depends_on = []
steps = [
    { action = "checkout", uses = "actions/checkout@v4" },
    { action = "install_nix", uses = "DeterminateSystems/nix-installer-action@main" },
    { action = "audit", run = "nix develop --command cargo audit" },
]

[quality_gates]
build_succeeds = true
all_tests_pass = true
clippy_no_warnings = true
fmt_check_passes = true
audit_zero_critical = true

[release]
profile = "release"
lto = true
codegen_units = 1
panic = "abort"
