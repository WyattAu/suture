[[interface]]
id = "IF-META-001"
name = "SQLite Metadata Store"
version = "1.0.0"
provider = "COMP-META-001"
consumers = ["COMP-CAS-001", "COMP-DAG-001", "COMP-CLI-001"]
description = "Persistent metadata storage for DAG, branches, and configuration"

[[interface.operation]]
name = "init"
description = "Initialize a new metadata database with the schema."

[[interface.operation.parameter]]
name = "path"
type = "&Path"
direction = "in"

[[interface.operation.return]]
type = "Result<MetadataStore, MetaError>"

[[interface.operation]]
name = "store_patch"
description = "Persist a patch to the metadata database."

[[interface.operation.parameter]]
name = "patch"
type = "&StoredPatch"
direction = "in"

[[interface.operation.return]]
type = "Result<(), MetaError>"

[[interface.operation]]
name = "get_patch"
description = "Retrieve a patch by ID."

[[interface.operation.parameter]]
name = "id"
type = "&PatchId"
direction = "in"

[[interface.operation.return]]
type = "Result<StoredPatch, MetaError>"

[[interface.operation]]
name = "set_branch"
description = "Create or update a branch pointer."

[[interface.operation.parameter]]
name = "name"
type = "&str"
direction = "in"
[[interface.operation.parameter]]
name = "target"
type = "&PatchId"
direction = "in"

[[interface.operation.return]]
type = "Result<(), MetaError>"

[[interface.operation]]
name = "get_branch"
description = "Get the target patch ID of a branch."

[[interface.operation.return]]
type = "Result<PatchId, MetaError>"

[[interface.operation]]
name = "list_branches"
description = "List all branches."

[[interface.operation.return]]
type = "Result<Vec<(String, PatchId)>, MetaError>"

[[interface.operation]]
name = "store_edge"
description = "Store a parent-child edge in the DAG."

[[interface.operation.parameter]]
name = "parent"
type = "&PatchId"
direction = "in"
[[interface.operation.parameter]]
name = "child"
type = "&PatchId"
direction = "in"

[[interface.operation.return]]
type = "Result<(), MetaError>"

[[interface.operation]]
name = "get_edges"
description = "Get all edges for a patch (both parents and children)."

[[interface.operation.parameter]]
name = "patch_id"
type = "&PatchId"
direction = "in"

[[interface.operation.return]]
type = "Result<(Vec<PatchId>, Vec<PatchId>), MetaError>"
description = "(parent_ids, child_ids)"
