[[interface]]
id = "IF-DAG-001"
name = "Patch DAG"
version = "1.0.0"
provider = "COMP-DAG-001"
consumers = ["COMP-META-001", "COMP-CLI-001"]
description = "Directed acyclic graph of patches with branch management"

[[interface.operation]]
name = "add_patch"
description = "Add a new patch to the DAG with given parent(s)."

[[interface.operation.parameter]]
name = "patch"
type = "Patch"
direction = "in"
[[interface.operation.parameter]]
name = "parents"
type = "Vec<PatchId>"
direction = "in"

[[interface.operation.return]]
type = "Result<PatchId, DagError>"

[[interface.operation.precondition]]
id = "PRE-DAG-001"
expression = "patch.id not already in DAG"
enforcement = "validate"
error_code = "DUPLICATE_PATCH"

[[interface.operation.precondition]]
id = "PRE-DAG-002"
expression = "all parents exist in DAG"
enforcement = "validate"
error_code = "PARENT_NOT_FOUND"

[[interface.operation.postcondition]]
id = "POST-DAG-001"
expression = "DAG remains acyclic"
enforcement = "assert"

[[interface.operation]]
name = "create_branch"
description = "Create a new named branch pointing to a patch."

[[interface.operation.parameter]]
name = "name"
type = "BranchName"
direction = "in"
[[interface.operation.parameter]]
name = "target"
type = "PatchId"
direction = "in"

[[interface.operation.return]]
type = "Result<(), DagError>"

[[interface.operation.precondition]]
id = "PRE-DAG-003"
expression = "branch name not already in use"
enforcement = "validate"

[[interface.operation.precondition]]
id = "PRE-DAG-004"
expression = "target patch exists in DAG"
enforcement = "validate"

[[interface.operation]]
name = "merge_branches"
description = "Compute the merge plan for two branches."

[[interface.operation.parameter]]
name = "branch_a"
type = "BranchName"
direction = "in"
[[interface.operation.parameter]]
name = "branch_b"
type = "BranchName"
direction = "in"

[[interface.operation.return]]
type = "Result<MergePlan, DagError>"

[interface.operation.complexity]
time = "O(|ancestors_a| + |ancestors_b| + merge_computation)"
space = "O(|ancestors_a| + |ancestors_b|)"

[[interface.operation]]
name = "ancestors"
description = "Get all transitive ancestors of a patch."

[[interface.operation.parameter]]
name = "patch_id"
type = "PatchId"
direction = "in"

[[interface.operation.return]]
type = "HashSet<PatchId>"

[interface.operation.complexity]
time = "O(V + E) DAG traversal"
space = "O(V)"
