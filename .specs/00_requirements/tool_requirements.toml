[metadata]
project = "Suture"
description = "Universal Semantic Version Control System"
version = "0.1.0"
license = "Apache-2.0"
repository = "https://github.com/Suture-VCS/suture"

[toolchain]
rust_edition = "2024"
rust_channel = "stable"
minimum_rust_version = "1.85.0"
nix_enabled = true
nix_flake = true
ci_rust_targets = ["x86_64-unknown-linux-gnu", "aarch64-unknown-linux-gnu", "aarch64-apple-darwin", "x86_64-pc-windows-msvc"]

[tools]
[tools.rust]
name = "rustc"
version = ">= 1.85.0"
purpose = "Core language compiler"
required = true
status = "active"

[tools.cargo]
name = "cargo"
version = ">= 1.85.0"
purpose = "Build system and package manager"
required = true
status = "active"

[tools.cargo-nextest]
name = "cargo-nextest"
version = ">= 0.9.0"
purpose = "Faster test runner with better output"
required = true
status = "active"

[tools.cargo-criterion]
name = "cargo-criterion"
version = ">= 0.4.0"
purpose = "Statistical benchmarking framework"
required = true
status = "active"

[tools.clippy]
name = "clippy"
version = "bundled with rustc"
purpose = "Linting and code quality checks"
required = true
status = "active"

[tools.rustfmt]
name = "rustfmt"
version = "bundled with rustc"
purpose = "Code formatting"
required = true
status = "active"

[tools.miri]
name = "miri"
version = "nightly"
purpose = "Undefined behavior detection for unsafe code"
required = false
status = "active"
notes = "Run in CI for all PRs touching unsafe code"

[tools.nix]
name = "nix"
version = ">= 2.20.0"
purpose = "Reproducible build environments via Nix Flakes"
required = true
status = "active"

[tools.just]
name = "just"
version = ">= 1.30.0"
purpose = "Task runner for development commands"
required = true
status = "active"

[tools.protobuf]
name = "protoc"
version = ">= 3.25.0"
purpose = "Protocol Buffers compiler for gRPC definitions"
required = false
status = "planned"
notes = "Required when Hub/gRPC phase begins"

[tools.proptest]
name = "proptest"
version = ">= 1.5.0"
purpose = "Property-based testing framework"
required = true
status = "active"
notes = "Critical for patch algebra axiom verification"

[tools.loom]
name = "loom"
version = ">= 0.7.0"
purpose = "Concurrency testing for lock-free data structures"
required = true
status = "active"
notes = "Used for SHM and DAG concurrency verification"

[dependencies]
[dependencies.blake3]
crate = "blake3"
version = "1.5"
purpose = "SIMD-accelerated cryptographic hashing for CAS content addressing"
features = ["pure"]

[dependencies.zstd]
crate = "zstd"
version = "0.13"
purpose = "Zstd compression for CAS blob storage"
features = ["zstd-safe"]

[dependencies.rusqlite]
crate = "rusqlite"
version = "0.32"
purpose = "Embedded SQLite for local metadata storage (WAL mode)"
features = ["bundled", "blob"]

[dependencies.flatbuffers]
crate = "flatbuffers"
version = "24.3"
purpose = "Zero-copy serialization for patch data and metadata"

[dependencies.ed25519-dalek]
crate = "ed25519-dalek"
version = "2.1"
purpose = "Ed25519 cryptographic signatures for patch signing and identity"
features = ["rand_core"]

[dependencies.tokio]
crate = "tokio"
version = "1"
purpose = "Async runtime for all I/O-bound operations"
features = ["rt-multi-thread", "fs", "io-util", "sync", "macros", "time"]

[dependencies.clap]
crate = "clap"
version = "4"
purpose = "CLI argument parsing with derive macros"
features = ["derive", "env", "string"]

[dependencies.serde]
crate = "serde"
version = "1"
purpose = "Serialization/deserialization framework for configuration and interchange"
features = ["derive"]

[dependencies.serde_json]
crate = "serde_json"
version = "1"
purpose = "JSON serialization for config files, audit log export, and API responses"

[dependencies.toml]
crate = "toml"
version = "0.8"
purpose = "TOML configuration file parsing and generation"

[dependencies.zeroize]
crate = "zeroize"
version = "1.8"
purpose = "Secure zeroization of cryptographic key material from memory"
features = ["derive", "aarch64"]

[dependencies.rand]
crate = "rand"
version = "0.8"
purpose = "Cryptographically secure random number generation for key pairs"
features = ["getrandom"]

[dependencies.thiserror]
crate = "thiserror"
version = "2"
purpose = "Typed error definitions for the public API"

[dependencies.anyhow]
crate = "anyhow"
version = "1"
purpose = "Flexible error handling for application-level code"

[dependencies.tracing]
crate = "tracing"
version = "0.1"
purpose = "Structured logging and diagnostics"
features = ["log"]

[dependencies.tracing-subscriber]
crate = "tracing-subscriber"
version = "0.3"
purpose = "Log output formatting and filtering"
features = ["env-filter", "json"]

[dependencies.proptest]
crate = "proptest"
version = "1.5"
purpose = "Property-based testing for patch algebra axioms"
dev_dependency = true

[dependencies.criterion]
crate = "criterion"
version = "0.5"
purpose = "Statistical benchmarking for performance acceptance criteria"
features = ["html_reports"]
dev_dependency = true

[dependencies.loom]
crate = "loom"
version = "0.7"
purpose = "Concurrency model testing for lock-free data structures"
dev_dependency = true

[dependencies.tempfile]
crate = "tempfile"
version = "3"
purpose = "Temporary directory creation for integration tests"
dev_dependency = true

[dependencies.assert_cmd]
crate = "assert_cmd"
version = "2"
purpose = "CLI integration testing"
dev_dependency = true

[dependencies.predicates]
crate = "predicates"
version = "3"
purpose = "Assertion predicates for CLI output testing"
dev_dependency = true

[dependencies.fluent]
crate = "fluent"
version = "0.16"
purpose = "Internationalization of CLI strings and error messages"
status = "planned"
notes = "Required for i18n support (EN, ZH-CN, JA)"

[dependencies.fluent-bundle]
crate = "fluent-bundle"
version = "0.15"
purpose = "Fluent message bundle management"
status = "planned"
notes = "Required for i18n support"

[dependencies.pyo3]
crate = "pyo3"
version = "0.23"
purpose = "Python bindings for integration with DaVinci Resolve and other Python-based applications"
status = "planned"
notes = "Required for Driver SDK Python bindings"

[dependencies.sha3]
crate = "sha3"
version = "0.10"
purpose = "SHA3-256 implementation for FIPS 140-3 compliant hash backend"
status = "planned"
notes = "Required when FIPS mode is implemented"

[dependencies.quinn]
crate = "quinn"
version = "0.11"
purpose = "QUIC transport protocol for Hub communication"
status = "planned"
notes = "Required when Hub/gRPC phase begins"

[dependencies.tonic]
crate = "tonic"
version = "0.12"
purpose = "gRPC framework for Hub daemon communication"
status = "planned"
notes = "Required when Hub/gRPC phase begins"

[dependencies.raft-rs]
crate = "raft"
version = "0.7"
purpose = "Raft consensus for distributed Hub coordination"
status = "planned"
notes = "Required when Hub phase begins"

[workspace]
members = [
    "crates/suture-core",
    "crates/suture-cli",
    "crates/suture-driver-otio",
]
