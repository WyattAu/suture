[build-system]
requires = ["setuptools>=64", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "suture-merge-driver"
version = "5.0.0"
description = "Git merge driver that semantically merges JSON, YAML, TOML, CSV, XML, Markdown, DOCX, XLSX, PPTX, and more"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.8"
authors = [
    {name = "WyattAu"},
]
keywords = ["git", "merge", "driver", "semantic", "json", "yaml", "toml", "docx", "xlsx", "conflict", "merge-driver"]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Version Control",
]

[project.urls]
Homepage = "https://github.com/WyattAu/suture"
Repository = "https://github.com/WyattAu/suture"

[project.scripts]
suture-merge-driver = "suture_merge_driver.cli:main"

[tool.setuptools.packages.find]
where = ["."]
